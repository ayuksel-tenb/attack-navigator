<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tenable → ATT&CK Exposure Viewer</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <div class="title">
      <h1>Tenable&nbsp;→&nbsp;ATT&amp;CK&nbsp;Exposure</h1>
    </div>
    <div class="controls">
      <button id="loadDefault" title="Load layers/layer.json from the server">Load layers/layer.json</button>
      <label class="file-btn">Upload layer…
        <input type="file" id="fileInput" accept="application/json,.json" hidden />
      </label>
      <button id="openSc" title="Open Security Center and log in once; finding links reuse this tab">Open SC ↗</button>
      <span class="sc" id="scInfo"></span>
    </div>
  </header>

  <main>
    <p class="hint" id="hint">
      Click a technique to see the vulnerabilities behind it. Click a finding to
      open it on your Security Center.
    </p>
    <div id="techniques"></div>
  </main>

  <!-- Runtime config (SC URL etc). Generated by gen-config.sh in Docker;
       falls back to defaults in app.js if absent. -->
  <script src="config.js" onerror="void 0"></script>
  <script src="app.js"></script>
</body>
</html>
