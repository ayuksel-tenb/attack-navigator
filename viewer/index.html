<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tenable → ATT&CK Exposure</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <div class="title">
      <h1>Tenable&nbsp;→&nbsp;ATT&amp;CK&nbsp;Exposure</h1>
    </div>
    <div class="controls">
      <label class="check"><input type="checkbox" id="onlyExposed" checked /> Only exposed</label>
      <button id="loadDefault" title="Load layers/layer.json from the server">Reload layer</button>
      <label class="file-btn">Upload layer…
        <input type="file" id="fileInput" accept="application/json,.json" hidden />
      </label>
      <button id="openSc" title="Open Security Center and log in once; finding links reuse this tab">Open SC ↗</button>
      <span class="sc" id="scInfo"></span>
    </div>
  </header>

  <main>
    <p class="hint" id="hint">Click a technique to see the vulnerabilities behind it.</p>
    <div id="matrix" class="matrix"></div>
  </main>

  <!-- Findings drawer -->
  <aside id="drawer" class="drawer" aria-hidden="true">
    <div class="drawer-head">
      <div>
        <div class="drawer-id" id="drawerId"></div>
        <div class="drawer-name" id="drawerName"></div>
      </div>
      <button id="drawerClose" class="drawer-close" title="Close">✕</button>
    </div>
    <div class="drawer-body" id="drawerBody"></div>
  </aside>
  <div id="scrim" class="scrim" hidden></div>

  <script src="config.js" onerror="void 0"></script>
  <script src="app.js"></script>
</body>
</html>
