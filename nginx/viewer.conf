server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # The viewer SPA.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Layer files, with permissive CORS so the official Navigator (on :4200)
    # can also auto-load them via ?layerURL=. Everything stays on localhost.
    location /layers/ {
        add_header Access-Control-Allow-Origin "*" always;
        autoindex on;
        autoindex_format json;
    }
}
